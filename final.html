<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Последний сюрприз ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.card{
    width:700px;
    max-width:90%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    padding:50px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h1{
    font-size:48px;
    margin-bottom:20px;
}

p{
    font-size:22px;
    line-height:1.7;
    margin-bottom:35px;
}

a{
    display:inline-block;
    text-decoration:none;
    background:white;
    color:#ff4f81;
    padding:18px 40px;
    border-radius:40px;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

a:hover{
    transform:scale(1.08);
}
</style>

</head>
<body>

<div class="card">

<h1>🎁 Последний сюрприз ❤️</h1>

<p>
Все, мы почти у финиша.<br><br>

У меня есть еще один подарок для тебя.<br>

Нажми на кнопку ниже. ❤️
</p>

<a href="https://t.me/trrst_911" target="_blank">
🎁 Открыть подарок


</a>

</div>

</body>
</html>
