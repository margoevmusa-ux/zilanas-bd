<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днём Рождения ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    min-height:100vh;
    overflow:hidden;
}

/* Hearts */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.hearts span{
    position:absolute;
    bottom:-50px;
    color:rgba(255,255,255,.4);
    font-size:22px;
    animation:float linear infinite;
}

.hearts span:nth-child(1){left:5%;animation-duration:10s;}
.hearts span:nth-child(2){left:15%;animation-duration:15s;}
.hearts span:nth-child(3){left:25%;animation-duration:12s;}
.hearts span:nth-child(4){left:35%;animation-duration:18s;}
.hearts span:nth-child(5){left:45%;animation-duration:13s;}
.hearts span:nth-child(6){left:55%;animation-duration:17s;}
.hearts span:nth-child(7){left:65%;animation-duration:11s;}
.hearts span:nth-child(8){left:75%;animation-duration:16s;}
.hearts span:nth-child(9){left:85%;animation-duration:14s;}
.hearts span:nth-child(10){left:95%;animation-duration:20s;}

@keyframes float{

0%{
transform:translateY(0);
opacity:0;
}

20%{
opacity:.5;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

/* Center */

.container{

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;

}

.logo{

position:absolute;
top:30px;
left:40px;
color:white;
letter-spacing:2px;

}

.card{

width:700px;
max-width:90%;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
padding:60px;
text-align:center;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.card h1{

font-size:52px;
margin-bottom:15px;

}

.card h2{

margin-bottom:30px;
font-size:34px;

}

.card p{

font-size:22px;
line-height:1.8;
margin-bottom:40px;

}

button{

padding:18px 45px;
border:none;
border-radius:50px;
background:white;
color:#ff4f81;
font-size:20px;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.08);
background:#ffe6ef;

}

</style>

</head>

<body>

<div class="hearts">
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
</div>

<div class="container">

<h3 class="logo">
zilana.int ❤️
</h3>

<div class="card">

<h1>
🎂 С Днём Рождения!
</h1>

<h2>
Моя любимая Зилана ❤️
</h2>

<p>

Сегодня особенный день.<br>
так что я приготовил тебе кое какой сюрприз ✨

</p>

<button onclick="startJourney()">
Начать ❤️
</button>

</div>

</div>

<script>

function startJourney(){

window.location.href="letter.html";

}

</script>

</body>
</html>
